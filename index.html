<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario - Intendencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --sidebar-width: 250px;
        }
        body {
            background-color: #f8f9fa;
        }
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            background: #212529;
            transition: all 0.3s;
        }
        #content {
            margin-left: var(--sidebar-width);
            padding: 20px;
            min-height: 100vh;
        }
        .nav-link {
            color: rgba(255,255,255,.75);
        }
        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255,255,255,.1);
        }
        @media (max-width: 768px) {
            #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
            #content { margin-left: 0; }
            #sidebar.active { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav id="sidebar" class="d-flex flex-column p-3">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-box-seam me-2 fs-4"></i>
            <span class="fs-4">Gestión IT</span>
        </a>
        <hr class="text-secondary">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active" onclick="filtrar('todos')">
                    <i class="bi bi-grid-fill me-2"></i> Todo el Inventario
                </a>
            </li>
            <li><a href="#" class="nav-link" onclick="filtrar('Toner')"><i class="bi bi-droplet-fill me-2"></i> Toners</a></li>
            <li><a href="#" class="nav-link" onclick="filtrar('Chip')"><i class="bi bi-cpu me-2"></i> Chips</a></li>
            <li><a href="#" class="nav-link" onclick="filtrar('Cartucho')"><i class="bi bi-printer me-2"></i> Cartuchos</a></li>
        </ul>
        <hr class="text-secondary">
        <div class="text-secondary small">
            v1.0 - Panel de Control
        </div>
    </nav>

    <main id="content">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h4 class="mb-0">Inventario de Refacciones</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRefaccion">
                <i class="bi bi-plus-lg"></i> Nueva Refacción
            </button>
        </header>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body text-center">
                        <h6>Total Unidades</h6>
                        <h2 id="totalUnidades">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-warning text-dark">
                    <div class="card-body text-center">
                        <h6>Stock Bajo (< 5)</h6>
                        <h2 id="stockBajoCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-success text-white">
                    <div class="card-body text-center">
                        <h6>Categorías</h6>
                        <h2>3</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Refacción</th>
                                <th>Categoría</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaInventario">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalRefaccion" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Refacción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formInventario">
                        <div class="mb-3">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" id="nombre" class="form-control" required placeholder="Ej: HP 85A">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select id="categoria" class="form-select">
                                <option value="Toner">Toner</option>
                                <option value="Chip">Chip</option>
                                <option value="Cartucho">Cartucho</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad Inicial</label>
                            <input type="number" id="cantidad" class="form-control" min="0" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar en Inventario</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Datos iniciales
        let inventario = [
            { id: 1, nombre: 'Toner HP CE285A', categoria: 'Toner', cantidad: 12 },
            { id: 2, nombre: 'Chip Universal Color', categoria: 'Chip', cantidad: 4 },
            { id: 3, nombre: 'Cartucho Canon PG-210', categoria: 'Cartucho', cantidad: 15 }
        ];

        const tabla = document.getElementById('tablaInventario');
        const form = document.getElementById('formInventario');
        const modalElement = document.getElementById('modalRefaccion');
        const bsModal = new bootstrap.Modal(modalElement);

        function renderizar(filtro = 'todos') {
            tabla.innerHTML = '';
            let total = 0;
            let bajos = 0;

            inventario.forEach((item, index) => {
                if (filtro !== 'todos' && item.categoria !== filtro) return;

                total += parseInt(item.cantidad);
                if (item.cantidad < 5) bajos++;

                const row = `
                    <tr>
                        <td><strong>${item.nombre}</strong></td>
                        <td><span class="badge bg-info text-dark">${item.categoria}</span></td>
                        <td>${item.cantidad}</td>
                        <td>
                            ${item.cantidad < 5 
                                ? '<span class="badge bg-danger">Stock Bajo</span>' 
                                : '<span class="badge bg-success">Disponible</span>'}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${index})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tabla.innerHTML += row;
            });

            document.getElementById('totalUnidades').innerText = total;
            document.getElementById('stockBajoCount').innerText = bajos;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const nuevaRefaccion = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                cantidad: document.getElementById('cantidad').value
            };

            inventario.push(nuevaRefaccion);
            form.reset();
            bsModal.hide();
            renderizar();
        });

        function eliminar(index) {
            if(confirm('¿Deseas eliminar este registro?')) {
                inventario.splice(index, 1);
                renderizar();
            }
        }

        function filtrar(cat) {
            // Quitar clase active de todos y ponerla en el seleccionado
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderizar(cat);
        }

        // Carga inicial
        renderizar();
    </script>
</body>
</html>
